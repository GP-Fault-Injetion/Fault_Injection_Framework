name: C Build CI

# 1. When should this workflow run?
on:
  push:
    branches: [ "main", "test" ]
  pull_request:
    branches: [ "main", "test" ]

jobs:
  build:
    # 2. What operating system should it run on?
    runs-on: ubuntu-latest

    steps:
    # 3. Grab the latest code from your repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 4. Compile Fault Configuration Tool
    - name: Compile Fault Configuration Tool
      run: gcc src/tool_main.c src/FaultConfig_interface.c Include/cJSON.c -I Include -o fault_config_tool || true

    # 5. Compile Embedded Framework
    - name: Compile Embedded Framework
      run: gcc src/*.c FrameWork_src_Files/*.c -I Include -I FrameWork_Header_Files -o embedded_simulation

    # 6. Run the full test suite
    - name: Run Test Suite
      run: |
        ./embedded_simulation
        echo "Exit code: $?"