name: C Build CI

# 1. When should this workflow run?
on:
  push:
    branches: [ "main", "test" ]
  pull_request:
    branches: [ "main", "test" ]

jobs:
  build:
    # 2. What operating system should it run on?
    runs-on: ubuntu-latest

    steps:
    # 3. Grab the latest code from your repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 4. Run your exact GCC command
    - name: Compile Fault Configuration Tool
      run: gcc tool_main.c FaultConfig_interface.c Include/cJSON.c -I Include -o fault_config_tool

    # 5. Optional: Run the tool briefly to ensure it executes without crashing
    # (We pass '3' to automatically select the "Exit" option in your menu)
    - name: Test Execution
      run: echo "3" | ./fault_config_tool